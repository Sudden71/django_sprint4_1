{% extends "base.html" %}
{% block title %}Редактирование профиля{% endblock %}

{% block content %}
<div class="container">
    <h2>Редактирование профиля</h2>
    
    <form method="post" class="mt-4">
        {% csrf_token %}
        
        <div class="mb-3">
            <label for="id_first_name" class="form-label">Имя</label>
            <input type="text" 
                   name="first_name" 
                   id="id_first_name" 
                   class="form-control" 
                   value="{{ user.first_name|default:'' }}">
        </div>
        
        <div class="mb-3">
            <label for="id_last_name" class="form-label">Фамилия</label>
            <input type="text" 
                   name="last_name" 
                   id="id_last_name" 
                   class="form-control" 
                   value="{{ user.last_name|default:'' }}">
        </div>
        
        <div class="mb-3">
            <label for="id_email" class="form-label">Email</label>
            <input type="email" 
                   name="email" 
                   id="id_email" 
                   class="form-control" 
                   value="{{ user.email|default:'' }}">
        </div>
        
        <div class="mb-3">
            <label>Имя пользователя</label>
            <input type="text" 
                   class="form-control" 
                   value="{{ user.username }}" 
                   disabled>
            <small class="form-text text-muted">
                Имя пользователя изменить нельзя
            </small>
        </div>
        
        <button type="submit" class="btn btn-primary">Сохранить изменения</button>
        <a href="{% url 'pages:profile' user.username %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
