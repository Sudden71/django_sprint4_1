<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Блогикум{% endblock %}</title>
    {% load django_bootstrap5 %}
    {% bootstrap_css %}
    {% bootstrap_javascript %}
</head>
<body>
    <header class="p-3 mb-4 border-bottom">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="{% url 'blog:index' %}" class="text-decoration-none">
                <h1 class="h3 m-0">Блогикум</h1>
            </a>
            
            <nav>
                {% if user.is_authenticated %}
                    <!-- Меню для авторизованных -->
                    <span class="me-3">Привет, <strong>{{ user.username }}</strong>!</span>
                    <a href="{% url 'blog:profile' user.username %}" class="btn btn-outline-primary me-2">
                        👤 Профиль
                    </a>
                    <a href="{% url 'logout' %}" class="btn btn-outline-danger">
                        🚪 Выйти
                    </a>
                {% else %}
                    <!-- Меню для гостей -->
                    <a href="{% url 'login' %}" class="btn btn-outline-primary me-2">
                        🔑 Войти
                    </a>
                    <a href="{% url 'pages:registration' %}" class="btn btn-outline-success">
                        📝 Регистрация
                    </a>
                {% endif %}
            </nav>
        </div>
    </header>
    
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    
    <footer class="p-3 mt-4 border-top">
        <div class="container text-center">
            <p class="text-muted">&copy; 2026 Блогикум</p>
        </div>
    </footer>
</body>
</html>
