{% extends "base.html" %}
{% block title %}
  Лента записей
{% endblock %}

{% block content %}
  {% if user.is_authenticated %}
  <div class="mb-4">
    <a href="{% url 'blog:create_post' %}" class="btn btn-success">+ Создать публикацию</a>
  </div>
  {% endif %}

  {% for post in page_obj %}
    <article class="mb-5">
      {% include "includes/post_card.html" %}
    </article>
  {% endfor %}
  {% include "includes/paginator.html" %}
{% endblock %}
