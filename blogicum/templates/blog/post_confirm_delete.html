{% extends "base.html" %}
{% block title %}Удаление публикации{% endblock %}

{% block content %}
<div class="container">
    <h2>Удаление публикации</h2>
    
    <div class="alert alert-warning mt-4">
        <p><strong>Вы уверены, что хотите удалить эту публикацию?</strong></p>
        <p>Заголовок: <strong>{{ post.title }}</strong></p>
        <p>Это действие нельзя отменить.</p>
    </div>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'blog:post_detail' post.id %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
